baseURL = "https://pocketdesk.github.io/"
languageCode = "en-us"
title = "pocketdesk"
theme = "hugo-book"

# hugo-book settings
disablePathToLower = false
enableGitInfo = true

[params]
  BookTheme = "auto"
  BookToC = true
  BookSection = "docs"
  BookRepo = "https://github.com/pocketdesk/pocketdesk.github.io"
  BookEditPath = "edit/main/content"
  BookSearch = true
  BookComments = false

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "github-dark"
    noClasses = true
    tabWidth = 2

[menu]
  [[menu.before]]
    name = "Home"
    url = "/"
    weight = 1
